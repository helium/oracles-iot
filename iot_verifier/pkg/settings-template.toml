# iot-verifier settings template.
#
# Values shown are the defaults; commented keys are optional. Any value can be
# overridden with a VERIFY_<SECTION>__<KEY> environment variable (double
# underscore separates nested keys), e.g. VERIFY_DATABASE__URL.

# RUST_LOG compatible log filter. Default below.
# log = "iot_verifier=debug"

# Reward period (how much time each reward epoch covers). Default 24 hours.
# reward_period = "24 hours"

# Delay after the end of a reward period before rewards are calculated.
# Default 30 minutes.
# reward_period_offset = "30 minutes"

# Max lookback age for the packet loader's file window. Default 1 hour.
# loader_window_max_lookback_age = "1 hour"

# Poll interval for incoming HPR packet files. Default 15 minutes.
# packet_interval = "15 minutes"

# How often the cached gateways are refreshed from iot-config. Default 30 minutes.
# gateway_refresh_interval = "30 minutes"

# File store clients. Required.
[file_store_clients]
# Local cache location for reports staged before upload. Required.
cache = "/var/data/iot-verified"

# Bucket the verifier writes reward shares and manifests to. Required.
[file_store_clients.output]
bucket = "mainnet-iot-verified"
# region = "us-west-2"
# endpoint = "https://s3.us-west-2.amazonaws.com"

# Bucket the verifier reads HPR data-transfer packet reports from. Required.
[file_store_clients.packet_input]
bucket = "mainnet-iot-packet-ingest"
# region = "us-west-2"
# endpoint = "https://s3.us-west-2.amazonaws.com"

[database]
# Postgres connection string. Required.
url = "postgres://postgres:postgres@127.0.0.1:5432/iot_verifier"
# max_connections = 10

# iot-config gRPC client (sub-dao reward info + gateway lookups). Required.
[iot_config_client]
url = "http://127.0.0.1:8080"
# Keypair used to sign requests to iot-config.
signing_keypair = "/etc/iot-verifier/signing_keypair.bin"
# b58 public key of the iot-config server, used to verify its responses.
config_pubkey = ""

# Price tracker (reads HNT price reports from the price oracle). Required.
[price_tracker]
# price_duration_minutes = 60

[price_tracker.bucket]
bucket = "mainnet-price"
# region = "us-west-2"
# endpoint = "https://s3.us-west-2.amazonaws.com"

[metrics]
# Prometheus scrape endpoint. Default below.
# endpoint = "127.0.0.1:19000"

# Iceberg connection settings, used by `backfill-rewards`. Optional; the
# `server` subcommand does not need this section.
#
# [iceberg_settings]
# catalog_uri = "https://iceberg-catalog.example/catalog"
# catalog_name = "helium"
# warehouse = "s3://iceberg-warehouse/"
#
# [iceberg_settings.auth]
# # token = "..."           # static OAuth2 token
# # credential = "..."      # OAuth2 client_id:client_secret
# # oauth2_server_uri = "..."
# # scope = "..."
#
# [iceberg_settings.s3]
# # endpoint = "https://s3.us-west-2.amazonaws.com"
# # region = "us-west-2"
# # access_key_id = "..."
# # secret_access_key = "..."
# # path_style_access = false
# # disable_config_load = false
